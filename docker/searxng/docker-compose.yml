version: "3.9"

services:
  searxng:
    image: searxng/searxng:latest
    container_name: drsa-searxng
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SEARXNG_SECRET_KEY=drsa-searxng-secret-change-me
      - SEARXNG_BASE_URL=http://localhost:8080
    volumes:
      - ./settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
    networks:
      - drsa-net

networks:
  drsa-net:
    driver: bridge

volumes:
  searxng-data:
